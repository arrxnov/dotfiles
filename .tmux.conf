# ~/.tmux.conf
# LazyVim (Tokyo Night) themed status bar with Nerd Font powerline separators.
# Prefix key remapped to Alt-a.
unbind C-b
set -g prefix M-a
bind M-a send-prefix
set -sg escape-time 10

set -g mouse on                 # click to select panes/windows, drag to resize
set -g renumber-windows on      # closing a window shifts others down, no gaps
set -g history-limit 10000
set -g focus-events on          # lets vim/nvim autoread on terminal focus
set -g allow-passthrough on     # needed for image previews / some TUIs
set-option -sa terminal-overrides ",xterm*:Tc"  # true color support
set -g status on
set -g status-interval 5        # refresh (clock/right side) every 5s
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 60
set -g status-left "#[fg=#2e3440,bg=#5e81ac,bold]  #S #[fg=#5e81ac,bg=#1a1b26]\ue0b0"
set -g status-right-length 60
set -g status-right "#[fg=#565f89,bg=#1a1b26]#[fg=#1a1b26,bg=#565f89] %Y-%m-%d #[fg=#7aa2f7,bg=#565f89]#[fg=#1a1b26,bg=#7aa2f7,bold] %H:%M "
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#1a1b26,bg=#3b4252]\ue0b0#[fg=#d8dee9,bg=#3b4252] #I #W #[fg=#3b4252,bg=#1a1b26]\ue0b0"
setw -g window-status-current-format "#[fg=#1a1b26,bg=#88c0d0]\ue0b0#[fg=#1a1b26,bg=#88c0d0,bold] #I #W #[fg=#88c0d0,bg=#1a1b26]\ue0b0"
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#ff9e64,bg=#2e3440"
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-status off
set -g message-style "fg=#1a1b26,bg=#e0af68,bold"
set -g message-command-style "fg=#1a1b26,bg=#9ece6a,bold"
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
